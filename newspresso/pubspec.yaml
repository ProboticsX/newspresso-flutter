name: newspresso
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  audio_service: ^0.18.15
  audio_session: ^0.2.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  google_sign_in: ^6.2.2
  just_audio: ^0.10.5
  supabase_flutter: ^2.12.0
  url_launcher: ^6.3.2
  google_mobile_ads: ^5.3.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "appicon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A0A08"
  adaptive_icon_foreground: "appicon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - appicon.png
